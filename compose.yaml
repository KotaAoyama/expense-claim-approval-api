services:
  postgres:
    image: postgres:16
    container_name: approval-workflow-postgres
    environment:
      POSTGRES_DB: approval_workflow
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: